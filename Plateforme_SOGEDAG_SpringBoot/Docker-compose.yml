version: '3.8'

services:
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "AM2406*2004/sa!"
      POSTGRES_DB: SOEGDAGG_DB
    ports:
      - "5000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin159753
    ports:
      - "8090:80"
    depends_on:
      - postgres

volumes:
  postgres_data: